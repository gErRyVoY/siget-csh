version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm i -g pnpm
        - pnpm config set store-dir .pnpm-store
        - pnpm i
    build:
      commands:
        - pnpm exec prisma generate
        - pnpm run build
        - mkdir -p .amplify-hosting/compute/default
        - mkdir -p .amplify-hosting/static
        - cp -r dist/server/* .amplify-hosting/compute/default/
        - cp -r dist/client/* .amplify-hosting/static/
        - cp -r dist/client/* .amplify-hosting/compute/default/
        - mv node_modules .amplify-hosting/compute/default/
        - cp package.json .amplify-hosting/compute/default/
        - echo "import './entry.mjs';" > .amplify-hosting/compute/default/server.js
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - .pnpm-store/**/*
